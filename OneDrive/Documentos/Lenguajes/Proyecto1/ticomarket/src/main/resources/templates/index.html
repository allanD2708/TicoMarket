<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoMarket - Inicio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }

        header {
            background-color: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #333;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-around;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
        }

        nav a:hover {
            background-color: #575757;
            border-radius: 5px;
        }

        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .product {
            border: 1px solid #ddd;
            border-radius: 5px;
            margin: 10px;
            padding: 15px;
            background: white;
            width: 220px;
            text-align: center;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>TicoMarket</h1>
        <p>El mejor marketplace para productos locales </p>
    </header>
    <nav>
        <a href="/">Inicio</a>
        <a href="/registro">Registrarse</a>
        <a href="/login">Iniciar Sesión</a>
        <a href="/mis-productos">Mis Productos</a>
       
    </nav>
    <div class="products">
        <!-- Los productos se cargarán dinámicamente -->
        <p id="no-products" style="display: none; color: #666;">No hay productos disponibles</p>
    </div>
    <footer>
        <p>&copy; TicoMarket 2025</p>
    </footer>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const productsContainer = document.querySelector('.products');
            const noProductsMessage = document.getElementById('no-products');

            const products = []; // Aquí puedes conectar tu API de productos

            if (products.length === 0) {
                noProductsMessage.style.display = 'block';
            } else {
                noProductsMessage.style.display = 'none';
                products.forEach(product => {
                    const productDiv = document.createElement('div');
                    productDiv.classList.add('product');
                    productDiv.innerHTML = `
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                        <p><strong>${product.price} USD</strong></p>
                    `;
                    productsContainer.appendChild(productDiv);
                });
            }
        });
    </script>
</body>
</html>
